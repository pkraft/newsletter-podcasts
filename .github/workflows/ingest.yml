name: Ingest episode

on:
  repository_dispatch:
    types: [publish-episode]

# One ingest at a time per series; concurrent dispatches queue rather than clobber.
concurrency:
  group: ingest-${{ github.event.client_payload.series_id }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - run: npm ci

      - name: Run ingest pipeline
        env:
          PAYLOAD: ${{ toJSON(github.event.client_payload) }}
        run: npm run ingest

      - name: Commit episode content
        run: |
          git config user.name "podcast-pipeline[bot]"
          git config user.email "pipeline@users.noreply.github.com"
          git add content/
          if git diff --cached --quiet; then
            echo "No content changes to commit."
            exit 0
          fi
          git commit -m "ingest: ${{ github.event.client_payload.series_id }} / ${{ github.event.client_payload.external_id }}"
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase
          done
          echo "Failed to push after 3 attempts" >&2
          exit 1

  # Pushes made with GITHUB_TOKEN do not trigger the push-based build workflow,
  # so ingest invokes it explicitly.
  build-deploy:
    needs: ingest
    uses: ./.github/workflows/build-deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write

  alert-on-failure:
    needs: [ingest, build-deploy]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const p = context.payload.client_payload ?? {};
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            try {
              await github.rest.issues.createLabel({
                ...context.repo,
                name: "pipeline-failure",
                color: "b60205",
                description: "publish-episode pipeline run failed",
              });
            } catch (e) { /* label already exists */ }
            // Dedupe: repeated failures for the same episode comment on the
            // existing open issue instead of opening a new one per attempt.
            const title = `Pipeline failure: ${p.series_id ?? "?"} / ${p.external_id ?? "?"}`;
            const existing = await github.rest.issues.listForRepo({
              ...context.repo,
              state: "open",
              labels: "pipeline-failure",
              per_page: 100,
            });
            const dup = existing.data.find((i) => i.title === title);
            if (dup) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: dup.number,
                body: `Failed again: ${runUrl}`,
              });
              return;
            }
            await github.rest.issues.create({
              ...context.repo,
              title,
              labels: ["pipeline-failure"],
              body: [
                "A publish-episode dispatch failed.",
                "",
                `- **Series:** ${p.series_id ?? "(missing)"}`,
                `- **External ID:** ${p.external_id ?? "(missing)"}`,
                `- **Title:** ${p.title ?? "(missing)"}`,
                `- **Audio URL:** ${p.audio_url ?? "(missing)"}`,
                `- **Run (see logs for the reason):** ${runUrl}`,
                "",
                "Common causes: unknown series_id, unreachable asset URL, invalid payload field,",
                "corrupt/oversized audio. Re-dispatching the same external_id after fixing the",
                "cause is safe (ingestion is idempotent).",
              ].join("\n"),
            });
