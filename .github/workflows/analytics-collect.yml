name: Collect analytics

on:
  schedule:
    - cron: "20 6 * * *" # daily 06:20 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: analytics
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Collect Cloudflare + OP3 stats
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          OP3_API_TOKEN: ${{ secrets.OP3_API_TOKEN }}
        run: npx tsx src/collectAnalytics.ts

      # No build trigger needed: the admin UI reads content/analytics/*.json via
      # the GitHub contents API, not from the published site.
      - name: Commit analytics data
        run: |
          git config user.name "analytics-collector[bot]"
          git config user.email "pipeline@users.noreply.github.com"
          git add content/analytics/
          if git diff --cached --quiet; then
            echo "No analytics changes."
            exit 0
          fi
          git commit -m "analytics: daily collection"
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase
          done
          exit 1
