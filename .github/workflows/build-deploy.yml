name: Build and deploy site

on:
  push:
    branches: [main]
    paths:
      - "content/**"
      - "src/**"
      - "site.config.json"
      - ".github/workflows/build-deploy.yml"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_call runs from the ingest commit's ref; make sure we build
          # the latest main, which includes the just-pushed episode.
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install ffmpeg (artwork resizing)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - run: npm ci
      - run: npm test
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
